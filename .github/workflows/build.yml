name: Build ESPHome Firmware

on:
  push:
    branches:
      - main
    paths:
      - 'esphome/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install ESPHome
        run: pip install esphome

      - name: Generate version.json and build_info.yaml
        id: version
        run: |
          VERSION=$(date +"%Y.%m.%d-%H%M")

          # version.json in /build/
          mkdir -p build
          echo "{ \"version\": \"$VERSION\", \"url\": \"https://raw.githubusercontent.com/${{ github.repository }}/main/build/f1-clock.bin\" }" > build/version.json

          # build_info.yaml in /esphome/
          echo "substitutions:" > esphome/build_info.yaml
          echo "  firmware_version: \"$VERSION\"" >> esphome/build_info.yaml

          # expose VERSION to other steps
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Debug build_info.yaml
        run: |
          echo "=== build_info.yaml ==="
          ls -al esphome
          cat esphome/build_info.yaml || echo "FILE NOT FOUND"
      
      - name: Debug build_info.yaml (hex)
        run: |
          echo "=== HEX DUMP build_info.yaml ==="
          hexdump -C esphome/build_info.yaml
      
      - name: Debug repo structure
        run: ls -R .
        
      - name: Build firmware
        run: |
          esphome compile esphome/f1_lamp.yaml

      - name: Locate firmware files
        id: find_fw
        run: |
          OTA=$(find esphome/.esphome/build -type f -name "firmware.ota.bin" | head -n 1)
          FACTORY=$(find esphome/.esphome/build -type f -name "firmware.factory.bin" | head -n 1)

          # Fallback voor OTA (sommige ESPHome-versies maken alleen firmware.bin)
          if [ -z "$OTA" ]; then
            OTA=$(find esphome/.esphome/build -type f -name "firmware.bin" | head -n 1)
          fi

          echo "OTA firmware: $OTA"
          echo "Factory firmware: $FACTORY"

          if [ -z "$OTA" ]; then
            echo "ERROR: No OTA firmware found!"
            exit 1
          fi

          if [ -z "$FACTORY" ]; then
            echo "ERROR: No FACTORY firmware found!"
            exit 1
          fi

          echo "ota_path=$OTA" >> $GITHUB_OUTPUT
          echo "factory_path=$FACTORY" >> $GITHUB_OUTPUT

      - name: Copy firmware to build folder
        run: |
          mkdir -p build
          cp "${{ steps.find_fw.outputs.ota_path }}" build/f1-clock-OTA.bin
          cp "${{ steps.find_fw.outputs.factory_path }}" build/f1-clock-FACTORY.bin

          echo "Created:"
          ls -al build
      
      - name: Generate MD5 checksum
        run: |
          cd build
          md5sum f1-lamp-OTA.bin > f1-clock-OTA.bin.md5
          echo "Generated MD5:"
          cat f1-lamp-OTA.bin.md5
      
      - name: Install mosquitto clients
        run: sudo apt-get update && sudo apt-get install -y mosquitto-clients
  
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: f1-clock-firmware
          path: build/

      - name: Commit build artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add build/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-build firmware"
          git push

      - name: Publish latest version to MQTT
        run: |
          mosquitto_pub -h gelden.ddns.net -p 2105 \
            -u "${{ secrets.MQTT_USER }}" \
            -P "${{ secrets.MQTT_PASS }}" \
            -t "f1/firmware/latest-clock" \
            -m "${{ steps.version.outputs.version }}" \
            -r
      - name: Publish firmware URL to MQTT
        run: |
          mosquitto_pub -h gelden.ddns.net -p 2105 \
            -u "${{ secrets.MQTT_USER }}" \
            -P "${{ secrets.MQTT_PASS }}" \
            -t "f1/firmware/url-clock" \
            -m "https://raw.githubusercontent.com/${{ github.repository }}/main/build/f1-clock-OTA.bin" \
            -r
